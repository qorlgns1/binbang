services:
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory-policy noeviction
    container_name: binbang-redis-local
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
    container_name: binbang-web-local
    restart: unless-stopped
    ports:
      - '${WEB_PORT:-3000}:3000'
    env_file:
      - ../.env.local
      - ../apps/web/.env.local
    environment:
      NODE_ENV: local
      DOCKER_ENV: 'true'
      WORKER_INTERNAL_URL: http://worker:3500
      REDIS_URL: ${REDIS_URL_DOCKER:-redis://redis:6379}
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: docker/worker.Dockerfile
    container_name: binbang-worker-local
    restart: unless-stopped
    ports:
      - '${WORKER_CONTROL_PORT:-3500}:3500'
    env_file:
      - ../.env.local
      - ../apps/worker/.env.local
    environment:
      NODE_ENV: local
      DOCKER_ENV: 'true'
      REDIS_URL: ${REDIS_URL_DOCKER:-redis://redis:6379}
      WEB_INTERNAL_URL: http://web:3000
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
